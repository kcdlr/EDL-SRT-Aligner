<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>EDL-SRT Aligner</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
 :root {
  color-scheme: light;
  --bg: #f5f7fb;
  --surface: #ffffff;
  --surface-soft: #f8fafc;
  --border: #d8dee8;
  --border-strong: #b8c2d2;
  --text: #1f2937;
  --muted: #5f6b7a;
  --accent: #2563eb;
  --accent-strong: #1d4ed8;
  --accent-soft: #e8f0ff;
  --focus: #93c5fd;
  --shadow: 0 14px 40px rgba(31, 41, 55, .08);
 }

 * { box-sizing: border-box; }

 body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.6;
 }

 .shell {
  width: min(1040px, calc(100% - 32px));
  margin: 0 auto;
  padding: 32px 0 40px;
 }

 .app-header {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 20px;
 }

 h1 {
  margin: 0;
  font-size: clamp(1.7rem, 3vw, 2.3rem);
  line-height: 1.15;
  letter-spacing: 0;
 }

 .subtitle {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: .96rem;
 }

 .version {
  flex: 0 0 auto;
  color: var(--muted);
  font-size: .86rem;
 }

 .panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow);
  overflow: hidden;
 }

 .section {
  padding: 22px;
  border-top: 1px solid var(--border);
 }

 .section:first-child { border-top: 0; }

 .section-title {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  margin: 0 0 14px;
 }

 h2 {
  margin: 0;
  font-size: 1rem;
  letter-spacing: 0;
 }

 .hint {
  margin: 0;
  color: var(--muted);
  font-size: .88rem;
 }

 .file-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
 }

 .file-field,
 .setting-row,
 .option {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-soft);
 }

 .file-field {
  display: grid;
  gap: 9px;
  padding: 14px;
 }

 .label-text {
  font-weight: 700;
  font-size: .92rem;
 }

 input[type="file"],
 input[type="number"] {
  width: 100%;
  color: var(--text);
  font: inherit;
 }

 input[type="file"] {
  min-height: 40px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: var(--surface);
  padding: 6px;
 }

 input[type="file"]::file-selector-button {
  min-height: 28px;
  margin-right: 10px;
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  background: #eef2f7;
  color: var(--text);
  font: inherit;
  cursor: pointer;
 }

 input[type="number"] {
  max-width: 140px;
  min-height: 40px;
  border: 1px solid var(--border-strong);
  border-radius: 7px;
  background: var(--surface);
  padding: 7px 10px;
 }

 input:focus-visible,
 button:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 2px;
 }

 .setting-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px 16px;
  padding: 14px;
 }

 .fps-control {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
 }

 .quick-btns {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
 }

 .quick-btns span {
  color: var(--muted);
  font-size: .88rem;
 }

 button {
  min-height: 38px;
  border: 1px solid var(--border-strong);
  border-radius: 7px;
  background: var(--surface);
  color: var(--text);
  font: inherit;
  cursor: pointer;
 }

 .quick-btns button {
  min-width: 58px;
  padding: 6px 10px;
 }

 button:hover {
  border-color: var(--accent);
  color: var(--accent-strong);
 }

 .option-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
 }

 .option {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 10px;
  padding: 14px;
  cursor: pointer;
 }

 .option input {
  margin-top: .25rem;
  accent-color: var(--accent);
 }

 .option:has(input:checked) {
  border-color: var(--accent);
  background: var(--accent-soft);
 }

 .option-title {
  display: block;
  font-weight: 700;
 }

 .option-desc {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: .9rem;
 }

 .single-option {
  max-width: 520px;
 }

 .detail-options {
  display: grid;
  gap: 14px;
 }

 .threshold-control {
  display: grid;
  gap: 6px;
 }

 .actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  background: #fbfcff;
 }

 .run-button {
  min-width: 150px;
  min-height: 44px;
  padding: 9px 18px;
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
  font-weight: 700;
 }

 .run-button:hover {
  border-color: var(--accent-strong);
  background: var(--accent-strong);
  color: #fff;
 }

 .log-wrap {
  display: grid;
  gap: 10px;
 }

 #log {
  min-height: 120px;
  max-height: 260px;
  overflow: auto;
  white-space: pre-wrap;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #111827;
  color: #e5e7eb;
  padding: 14px;
  font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
  font-size: .88rem;
 }

 @media (max-width: 760px) {
  .shell {
   width: min(100% - 24px, 1040px);
   padding-top: 20px;
  }

  .app-header,
  .actions {
   align-items: stretch;
   flex-direction: column;
  }

  .file-grid,
  .option-grid {
   grid-template-columns: 1fr;
  }

  .section {
   padding: 18px;
  }

  .run-button {
   width: 100%;
  }
 }
</style>
</head>

<body>
<main class="shell">
 <header class="app-header">
  <div>
   <h1>EDL-SRT Aligner</h1>
   <p class="subtitle">EDLの編集点に合わせて、SRT字幕のタイミングを整えます。</p>
  </div>
  <div class="version">Client-side tool</div>
 </header>

 <div class="panel">
  <section class="section">
   <div class="section-title">
    <h2>入力ファイル</h2>
    <p class="hint">EDLとSRTの両方を選択してください</p>
   </div>

   <div class="file-grid">
    <label class="file-field">
     <span class="label-text">EDL ファイル</span>
     <input type="file" id="edlFile" accept=".edl,.txt">
    </label>
    <label class="file-field">
     <span class="label-text">SRT ファイル</span>
     <input type="file" id="srtFile" accept=".srt,.txt">
    </label>
   </div>
  </section>

  <section class="section">
   <div class="section-title">
    <h2>フレームレート</h2>
    <p class="hint">任意の値を直接入力できます</p>
   </div>

   <div class="setting-row">
    <label class="fps-control">
     <span class="label-text">FPS</span>
     <input type="number" id="fpsInput" value="60" step="0.001">
    </label>
    <div class="quick-btns" aria-label="よく使うFPS">
     <span>よく使う値</span>
     <button type="button" onclick="setFps(23.976)">23.976</button>
     <button type="button" onclick="setFps(24)">24</button>
     <button type="button" onclick="setFps(25)">25</button>
     <button type="button" onclick="setFps(29.97)">29.97</button>
     <button type="button" onclick="setFps(30)">30</button>
     <button type="button" onclick="setFps(59.94)">59.94</button>
     <button type="button" onclick="setFps(60)">60</button>
    </div>
   </div>
  </section>

  <section class="section">
   <div class="section-title">
    <h2>実行モード</h2>
   </div>

   <div class="option-grid">
    <label class="option">
     <input type="radio" name="mode" value="strict" checked>
     <span>
      <span class="option-title">クリップ数一致モード</span>
      <span class="option-desc">出力後の字幕数はEDLクリップ数と一致し、各字幕の開始・終了時刻も対応するEDLクリップと一致します。字幕本文には、始点と終点のズレが最小となる元字幕を使います。同じ元字幕が複数回使われる場合があります。</span>
     </span>
    </label>

    <label class="option">
     <input type="radio" name="mode" value="minimal">
     <span>
      <span class="option-title">編集点合わせモード（試験段階）</span>
      <span class="option-desc">字幕境界が許容ずれ以内ならEDLの編集点へ吸着し、超える場合は字幕の途中にあるEDL編集点で分割します。字幕クリップの削除は行われません。</span>
     </span>
    </label>
   </div>
  </section>

  <section class="section">
   <div class="section-title">
    <h2>詳細オプション</h2>
   </div>

   <div class="detail-options">
    <div class="setting-row">
     <label class="threshold-control">
      <span class="label-text">編集点合わせの許容ずれ（秒）</span>
      <input type="number" id="snapThresholdInput" value="1" min="0" step="0.001">
      <span class="option-desc">字幕境界がこの秒数以内なら吸着し、超える場合は字幕の途中にあるEDL編集点で分割します。</span>
     </label>
    </div>

    <label class="option single-option">
     <input type="checkbox" id="offsetCheckbox">
     <span>
      <span class="option-title">1msオフセットを有効にする</span>
      <span class="option-desc">字幕クリップが1フレームずれる場合に使用します。</span>
     </span>
    </label>
   </div>
  </section>

  <section class="section actions">
   <button id="runBtn" class="run-button">実行してSRTを書き出す</button>
   <p class="hint">処理はブラウザ内で完結します。</p>
  </section>

  <section class="section log-wrap">
   <div class="section-title">
    <h2>処理ログ</h2>
   </div>
   <div id="log" aria-live="polite"></div>
  </section>
 </div>
</main>

<script src="script.js"></script>
</body>
</html>
